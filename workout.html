<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IronLog</title>
<meta name="theme-color" content="#09090B">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090B; --card:#18181B; --card2:#27272A; --border:#3F3F46;
  --primary:#6366F1; --primary-light:#818CF8; --primary-dim:rgba(99,102,241,0.15);
  --green:#22C55E; --green-dim:rgba(34,197,94,0.12);
  --orange:#F59E0B; --orange-dim:rgba(245,158,11,0.15);
  --red:#EF4444; --red-dim:rgba(239,68,68,0.12);
  --text:#FAFAFA; --muted:#A1A1AA; --faint:#52525B;
  --r:14px; --r-sm:10px; --r-xs:6px;
  --nav-h:68px; --safe-b:env(safe-area-inset-bottom,0px);
  --sidebar-w:220px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── APP SHELL ───────────────────────────────────────────── */
#app{display:flex;min-height:100vh}
#content-wrap{flex:1;min-width:0;max-width:100%}
#content{min-height:100vh;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px)}
#content.no-nav{padding-bottom:40px}

/* ── SIDEBAR (desktop only) ──────────────────────────────── */
#sidebar{
  display:none;width:var(--sidebar-w);flex-shrink:0;
  background:var(--card);border-right:1px solid var(--border);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  flex-direction:column;gap:0;z-index:100;
}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:26px}
.sidebar-title{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.sidebar-nav{display:flex;flex-direction:column;padding:12px 12px;gap:2px;flex:1}
.sidebar-btn{
  display:flex;align-items:center;gap:10px;
  background:none;border:none;border-radius:var(--r-sm);
  color:var(--muted);font-family:inherit;font-size:14px;font-weight:500;
  padding:10px 12px;cursor:pointer;text-align:left;transition:all 0.15s;width:100%;
}
.sidebar-btn:hover{background:var(--card2);color:var(--text)}
.sidebar-btn.active{background:var(--primary-dim);color:var(--primary-light);font-weight:600}
.sidebar-btn svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sidebar-profile{
  display:flex;align-items:center;gap:10px;
  background:var(--card2);border-radius:var(--r-sm);padding:10px 12px;
  cursor:pointer;transition:background 0.15s;
}
.sidebar-profile:hover{background:var(--border)}
.sp-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sp-info{flex:1;min-width:0}
.sp-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-switch{font-size:11px;color:var(--faint)}

/* ── BOTTOM NAV (mobile only) ────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);
  background:rgba(24,24,27,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:8px;z-index:100;
}
#bottom-nav.hidden{display:none}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--faint);font-size:11px;font-weight:500;cursor:pointer;padding:6px 0;transition:color 0.2s;font-family:inherit}
.nav-btn.active{color:var(--primary)}
.nav-btn svg{width:22px;height:22px}

/* ── DESKTOP BREAKPOINT ──────────────────────────────────── */
@media(min-width:768px){
  body{background:#0D0D11}
  #app{max-width:1280px;margin:0 auto;background:var(--bg);box-shadow:0 0 0 1px var(--border)}
  #sidebar{display:flex}
  #bottom-nav{display:none!important}
  #content{padding-bottom:32px}
  #content.no-nav{padding-bottom:0}
  .templates-grid{grid-template-columns:repeat(3,1fr)}
  .profiles-grid{grid-template-columns:repeat(3,1fr)}
  .stats-row{grid-template-columns:repeat(4,1fr)}
  .history-list{gap:12px}
  .exercise-card{margin:12px 24px 0}
  .section{padding:0 24px 24px}
  .page-header{padding:24px 24px 16px}
  .category-tabs{padding:0 24px 16px}
  .exercise-list{padding:0 24px}
  .search-box{margin:0 24px 12px;width:calc(100% - 48px)}
  .history-list{padding:0 24px}
  .history-ex-card{margin:0 24px}
  .home-header{padding:28px 24px 20px}
  .stats-row{padding:0 24px 24px}
  .resume-banner{margin:0 24px 20px}
  .templates-grid{padding:0 24px 24px}
  .custom-workout-btn{margin:0 24px 24px;width:calc(100% - 48px)}
  .workout-topbar{padding:14px 24px}
  .sets-header{grid-template-columns:40px 1fr 100px 36px 80px 48px}
  .set-row{grid-template-columns:40px 1fr 100px 36px 80px 48px;padding:10px 16px}
  .finish-sheet,.manage-sheet,.cp-sheet{max-width:520px;margin:0 auto}
}

/* ── TYPOGRAPHY ──────────────────────────────────────────── */
h1{font-size:26px;font-weight:800;letter-spacing:-0.5px}
h2{font-size:17px;font-weight:700}
h3{font-size:15px;font-weight:600}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r-sm);font-family:inherit;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s;-webkit-user-select:none;user-select:none}
.btn:active{opacity:0.75;transform:scale(0.97)}
.btn-primary{background:var(--primary);color:#fff;padding:14px 20px;font-size:15px;border-radius:var(--r);width:100%}
.btn-ghost{background:var(--card2);color:var(--text);padding:10px 16px;font-size:14px}
.btn-danger{background:var(--red-dim);color:var(--red);padding:10px 16px;font-size:14px}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-icon{width:40px;height:40px;padding:0;border-radius:50%;background:var(--card2);color:var(--muted);font-size:18px}

/* ── BADGES ──────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-primary{background:var(--primary-dim);color:var(--primary-light)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-orange{background:var(--orange-dim);color:var(--orange)}
.badge-muted{background:var(--card2);color:var(--muted)}

/* ── INPUTS ──────────────────────────────────────────────── */
input[type=number],input[type=text],textarea{font-family:inherit;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:16px;outline:none;transition:border-color 0.2s}
input[type=number]:focus,input[type=text]:focus,textarea:focus{border-color:var(--primary)}
input[type=number]{-moz-appearance:textfield;text-align:center;font-weight:700;padding:10px 6px;width:100%}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-header{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 12px;gap:12px}
.page-header h2{font-size:22px;font-weight:800}

/* ── PROFILES SCREEN ─────────────────────────────────────── */
.profiles-screen{min-height:100vh;display:flex;flex-direction:column;padding:0 0 40px}
.profiles-hero{text-align:center;padding:56px 24px 32px}
.profiles-logo{font-size:56px;margin-bottom:12px}
.profiles-title{font-size:36px;font-weight:900;letter-spacing:-1px}
.profiles-subtitle{color:var(--muted);font-size:15px;margin-top:8px}
.profiles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px 16px}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);border-top:3px solid var(--pcolor);padding:20px 16px 18px;cursor:pointer;font-family:inherit;text-align:center;transition:background 0.15s,transform 0.1s;display:flex;flex-direction:column;align-items:center;gap:8px}
.profile-card:active{background:var(--card2);transform:scale(0.97)}
.profile-avatar{font-size:38px;line-height:1}
.profile-name{font-size:15px;font-weight:700}
.profile-stats{font-size:12px;color:var(--muted);line-height:1.5}
.create-profile-btn{margin:0 16px;background:transparent;border:2px dashed var(--border);border-radius:var(--r);padding:22px;color:var(--muted);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;width:calc(100% - 32px);display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color 0.2s,color 0.2s}
.create-profile-btn:hover{border-color:var(--primary);color:var(--primary-light)}

/* ── CREATE PROFILE MODAL ────────────────────────────────── */
#create-profile-modal{position:fixed;inset:0;z-index:500;display:flex;align-items:flex-end}
#create-profile-modal.hidden{display:none}
.cp-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
.cp-sheet{position:relative;width:100%;max-width:480px;margin:0 auto;background:var(--card);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border);border-bottom:none;padding:24px 20px calc(32px + var(--safe-b));z-index:1;max-height:92vh;overflow-y:auto}
.cp-sheet h3{font-size:20px;font-weight:800;margin-bottom:20px}
.cp-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.cp-name-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:18px;font-weight:700;padding:14px 16px;outline:none;font-family:inherit;transition:border-color 0.2s;margin-bottom:20px}
.cp-name-input:focus{border-color:var(--primary)}
.cp-name-input::placeholder{color:var(--faint);font-weight:400}
.color-picker{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s,border-color 0.15s;flex-shrink:0}
.color-swatch.selected{border-color:#fff;transform:scale(1.15)}
.emoji-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.emoji-opt{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--card2);border-radius:var(--r-sm);cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.1s}
.emoji-opt.selected{border-color:var(--primary);transform:scale(1.1)}
.cp-preview{display:flex;align-items:center;gap:14px;background:var(--card2);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:20px}
.cp-preview-avatar{font-size:32px;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cp-preview-name{font-size:16px;font-weight:700}
.cp-preview-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* ── HOME ────────────────────────────────────────────────── */
.home-header{display:flex;align-items:center;justify-content:space-between;padding:24px 16px 16px;gap:12px}
.home-profile-btn{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:6px 14px 6px 6px;cursor:pointer;font-family:inherit;transition:background 0.15s;flex-shrink:0}
.home-profile-btn:active{background:var(--card2)}
.hpb-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hpb-name{font-size:13px;font-weight:600}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center}
.stat-value{display:block;font-size:22px;font-weight:800}
.stat-label{display:block;font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.section{padding:0 16px 24px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.see-all{background:none;border:none;color:var(--primary-light);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.template-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.template-scroll::-webkit-scrollbar{display:none}
.template-quick-card{flex-shrink:0;width:130px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);border-top:3px solid var(--color);padding:14px 12px;text-align:left;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;gap:4px;transition:background 0.15s}
.template-quick-card:active{background:var(--card2)}
.tqc-emoji{font-size:24px;margin-bottom:4px;display:block}
.tqc-name{font-size:13px;font-weight:700}
.tqc-desc{font-size:11px;color:var(--muted);line-height:1.3}
.resume-banner{margin:0 16px 16px;background:var(--primary-dim);border:1px solid var(--primary);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.resume-banner:active{opacity:0.8}
.resume-info{flex:1}
.resume-name{font-weight:700;font-size:14px}
.resume-time{font-size:12px;color:var(--primary-light);margin-top:2px}
.workout-history-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:background 0.15s}
.workout-history-card:active,.workout-history-card:hover{background:var(--card2)}
.whc-head{display:flex;justify-content:space-between;align-items:flex-start}
.whc-name{font-weight:700;font-size:15px}
.whc-date{font-size:12px;color:var(--muted);margin-top:2px}
.whc-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.whc-meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.whc-meta-item strong{color:var(--text)}
.whc-exercises{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.empty-state{text-align:center;padding:48px 32px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-state h3{color:var(--text);margin-bottom:8px}
.empty-state p{font-size:14px;line-height:1.5}

/* ── TEMPLATES ───────────────────────────────────────────── */
.templates-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px 24px}
.template-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);border-top:3px solid var(--color);padding:16px 14px;cursor:pointer;font-family:inherit;text-align:left;transition:background 0.15s,transform 0.1s;display:flex;flex-direction:column;gap:6px}
.template-card:active,.template-card:hover{background:var(--card2)}
.tc-emoji{font-size:28px}
.tc-name{font-size:14px;font-weight:700}
.tc-desc{font-size:12px;color:var(--muted);line-height:1.4}
.tc-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.custom-workout-btn{margin:0 16px 24px;background:transparent;border:2px dashed var(--border);border-radius:var(--r);padding:20px;color:var(--muted);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;width:calc(100% - 32px);display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color 0.2s,color 0.2s}
.custom-workout-btn:hover{border-color:var(--primary);color:var(--primary-light)}

/* ── ACTIVE WORKOUT ──────────────────────────────────────── */
.workout-topbar{position:sticky;top:0;z-index:50;background:rgba(9,9,11,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:12px 16px}
.workout-topbar-info{flex:1;min-width:0}
.workout-topbar-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.workout-timer{font-size:13px;color:var(--primary-light);font-weight:600;font-variant-numeric:tabular-nums}
.exercise-card{margin:12px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.exercise-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;gap:10px}
.exercise-card-info{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:700}
.ex-cat{font-size:12px;color:var(--muted);margin-top:2px}
.sets-header{display:grid;grid-template-columns:36px 1fr 80px 36px 68px 44px;padding:6px 12px;background:var(--card2);gap:4px}
.sets-header span{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:0.5px;text-align:center}
.sets-header span:first-child{text-align:left}
.set-row{display:grid;grid-template-columns:36px 1fr 80px 36px 68px 44px;align-items:center;padding:8px 12px;gap:4px;border-top:1px solid var(--border);transition:background 0.2s}
.set-row.completed{background:var(--green-dim)}
.set-row.completed .set-input{border-color:var(--green);color:var(--green)}
.set-num{font-size:13px;font-weight:700;color:var(--muted);text-align:center}
.set-prev{font-size:11px;color:var(--faint);text-align:center;line-height:1.3;padding:0 2px}
.set-input{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-xs);color:var(--text);font-size:16px;font-weight:700;text-align:center;padding:8px 4px;width:100%;font-family:inherit;outline:none;transition:border-color 0.2s}
.set-input:focus{border-color:var(--primary)}
.set-sep{font-size:14px;color:var(--faint);text-align:center;font-weight:600}
.set-done-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;margin:0 auto}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.exercise-actions{display:flex;gap:8px;padding:10px 12px 12px;border-top:1px solid var(--border)}
.note-input{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--muted);font-size:13px;padding:10px 16px;resize:none;min-height:40px;max-height:80px;font-family:inherit;outline:none}
.note-input::placeholder{color:var(--faint)}

/* ── HISTORY ─────────────────────────────────────────────── */
.history-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.history-detail-header{padding:16px;border-bottom:1px solid var(--border)}
.hdh-name{font-size:20px;font-weight:800}
.hdh-meta{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.hdh-meta-item{display:flex;flex-direction:column;gap:2px}
.hdh-meta-item span:first-child{font-size:18px;font-weight:800}
.hdh-meta-item span:last-child{font-size:11px;color:var(--muted)}
.history-ex-card{margin:0 16px;border-top:1px solid var(--border);padding:14px 0}
.hec-name{font-size:14px;font-weight:700;margin-bottom:8px}
.hec-sets{display:flex;flex-direction:column;gap:4px}
.hec-set{font-size:13px;color:var(--muted);display:flex;gap:8px;align-items:center}
.hec-set .set-n{color:var(--faint);font-size:11px;font-weight:700;min-width:30px}
.hec-set .set-val{color:var(--text);font-weight:600}
.pr-star{color:var(--orange);font-size:11px}

/* ── EXERCISES ───────────────────────────────────────────── */
.category-tabs{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;cursor:pointer;transition:all 0.2s}
.cat-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.exercise-list{padding:0 16px;display:flex;flex-direction:column;gap:1px}
.exercise-item{background:var(--card);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:var(--r-xs)}
.ei-info{flex:1}
.ei-name{font-size:14px;font-weight:600}
.ei-meta{font-size:12px;color:var(--muted);margin-top:2px}
.ei-pr{text-align:right}
.ei-pr-val{font-size:14px;font-weight:700;color:var(--primary-light)}
.ei-pr-label{font-size:11px;color:var(--faint)}
.search-box{margin:0 16px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:15px;padding:12px 16px;width:calc(100% - 32px);display:block;outline:none}
.search-box::placeholder{color:var(--faint)}
.search-box:focus{border-color:var(--primary)}

/* ── REST TIMER ──────────────────────────────────────────── */
#rest-modal{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:50%;transform:translateX(-50%) translateY(0);width:100%;max-width:480px;background:var(--card);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:20px 20px calc(20px + var(--safe-b));z-index:200;transition:transform 0.3s cubic-bezier(.4,0,.2,1)}
#rest-modal.hidden{transform:translateX(-50%) translateY(110%)}
@media(min-width:768px){#rest-modal{bottom:0;max-width:420px;border-radius:var(--r)}}
.rest-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.rest-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.rest-time-display{font-size:52px;font-weight:900;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-2px;margin:8px 0 16px}
.rest-time-display.urgent{color:var(--red)}
.rest-progress-bar{height:4px;background:var(--card2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.rest-progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width 0.9s linear}
.rest-actions{display:flex;gap:8px}

/* ── MODALS ──────────────────────────────────────────────── */
#finish-modal,#picker-modal,#manage-modal{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end}
#finish-modal.hidden,#picker-modal.hidden,#manage-modal.hidden{display:none}
.finish-backdrop,.picker-backdrop,.manage-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
.finish-sheet,.manage-sheet{position:relative;width:100%;max-width:480px;margin:0 auto;background:var(--card);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border);border-bottom:none;padding:24px 20px calc(32px + var(--safe-b));z-index:1}
.picker-sheet{position:relative;width:100%;max-width:480px;margin:0 auto;background:var(--bg);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border);border-bottom:none;height:80vh;z-index:1;display:flex;flex-direction:column}
.finish-title{font-size:22px;font-weight:800;margin-bottom:4px}
.finish-sub{color:var(--muted);font-size:14px;margin-bottom:20px}
.finish-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.finish-stat{background:var(--card2);border-radius:var(--r-sm);padding:12px;text-align:center}
.finish-stat-val{font-size:20px;font-weight:800;display:block}
.finish-stat-label{font-size:11px;color:var(--muted);margin-top:2px;display:block}
.finish-actions{display:flex;flex-direction:column;gap:8px}
.picker-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.picker-header h3{font-size:17px;font-weight:700;margin-bottom:10px}
.picker-search{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:15px;padding:10px 14px;font-family:inherit;outline:none}
.picker-cats{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;flex-shrink:0}
.picker-cats::-webkit-scrollbar{display:none}
.picker-list{flex:1;overflow-y:auto;padding:8px 16px 16px}
.picker-item{padding:14px 12px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.15s}
.picker-item:active,.picker-item:hover{background:var(--card2)}
.picker-item-name{font-size:14px;font-weight:600}
.picker-item-cat{font-size:12px;color:var(--muted);margin-top:2px}
.picker-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;float:right;line-height:1}
.manage-profile-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--border);cursor:pointer;transition:opacity 0.15s}
.manage-profile-row:first-of-type{border-top:none}
.manage-profile-row:hover{opacity:0.8}
.manage-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.manage-name{flex:1;font-size:15px;font-weight:600}
.manage-count{font-size:12px;color:var(--muted)}
.manage-active-badge{background:var(--primary-dim);color:var(--primary-light);font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}

/* ── TOAST ───────────────────────────────────────────────── */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:14px;font-weight:600;padding:12px 20px;z-index:400;opacity:0;transition:all 0.3s ease;white-space:nowrap;pointer-events:none;max-width:calc(100vw - 32px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:24px}}
</style>

// ── UTILS ─────────────────────────────────────────────────
function fmtDuration(sec) {
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtDate(iso) {
  const d=new Date(iso),now=new Date(),days=Math.floor((now-d)/86400000);
  if(days===0) return 'Today';
  if(days===1) return 'Yesterday';
  if(days<7)   return d.toLocaleDateString('en-US',{weekday:'long'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtVol(vol) {
  return vol>=1000 ? (vol/1000).toFixed(1)+'k' : Math.round(vol).toString();
}
function calcVolume(exercises) {
  return exercises.reduce((t,ex)=>t+ex.sets.reduce((s,set)=>s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);
}
function epley1RM(w,r) { return r===1?w:Math.round(w*(1+r/30)); }
function checkUpdatePR(exId, weight, reps) {
  const prs=STORE.getPRs(), e1rm=epley1RM(weight,reps);
  if(!prs[exId]||e1rm>prs[exId].oneRM) {
    prs[exId]={weight,reps,oneRM:e1rm,date:new Date().toISOString().split('T')[0]};
    STORE.savePRs(prs); return true;
  }
  return false;
}
function getLastExData(exId) {
  const history=STORE.getHistory();
  for(let i=history.length-1;i>=0;i--){const ex=history[i].exercises.find(e=>e.exerciseId===exId);if(ex&&ex.sets.length>0)return ex;}
  return null;
}
function showToast(msg,ms=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

function saveProfile() {
  const name=document.getElementById('cp-name')?.value?.trim();
  if(!name){document.getElementById('cp-name').focus();showToast('Please enter a name');return;}
  const profiles=getProfiles();
  if(cpEditId){
    const idx=profiles.findIndex(p=>p.id===cpEditId);
    if(idx!==-1){profiles[idx].name=name;profiles[idx].color=cpColor;profiles[idx].emoji=cpEmoji;}
  } else {
    const id=Date.now().toString();
    profiles.push({id,name,color:cpColor,emoji:cpEmoji,createdAt:new Date().toISOString()});
    if(profiles.length===1) setCurrentProfileId(id);
  }
  saveProfiles(profiles);
  closeCreateProfile();
  renderContent();
  if(cpEditId) showToast('Profile updated!');
}

// ── WORKOUT LOGIC ─────────────────────────────────────────
function startWorkout(templateId) {
  if(activeWorkout&&!confirm('Discard current workout and start a new one?')) return;
  clearInterval(workoutTimer);
  const template=TEMPLATES.find(t=>t.id===templateId);
  if(!template) return;
  activeWorkout={id:Date.now(),templateId,name:template.name,startTime:Date.now(),
    exercises:template.exercises.map(te=>{
      const ex=EXERCISES.find(e=>e.id===te.id);
      return buildExerciseEntry(ex||{id:te.id,name:te.id,cat:'',muscle:''},te.sets,te.reps,getLastExData(te.id));
    })};
  workoutElapsed=0;
  workoutTimer=setInterval(()=>{workoutElapsed++;const el=document.getElementById('wt-timer');if(el)el.textContent=fmtDuration(workoutElapsed);},1000);
  navigate('workout');
}
function buildExerciseEntry(ex,numSets,defaultReps,lastData) {
  return {exerciseId:ex.id,name:ex.name,cat:ex.cat,muscle:ex.muscle,note:'',lastData,
    sets:Array.from({length:numSets},(_,i)=>{
      const ls=lastData?.sets[i];
      return{weight:ls?parseFloat(ls.weight)||0:0,reps:ls?parseInt(ls.reps):defaultReps,completed:false};
    })};
}
function startCustomWorkout() {
  if(activeWorkout&&!confirm('Discard current workout?')) return;
  clearInterval(workoutTimer);
  activeWorkout={id:Date.now(),templateId:'custom',name:'Custom Workout',startTime:Date.now(),exercises:[]};
  workoutElapsed=0;
  workoutTimer=setInterval(()=>{workoutElapsed++;const el=document.getElementById('wt-timer');if(el)el.textContent=fmtDuration(workoutElapsed);},1000);
  navigate('workout');
  setTimeout(()=>openPicker(),100);
}

function renderExerciseCard(ex,ei) {

    return `<div class="${set.completed?'set-row completed':'set-row'}" id="set-${ei}-${si}">

      <span class="set-prev">${prev}</span>

        onchange="updateSet(${ei},${si},'weight',this.value)" onfocus="this.select()">
      <span class="set-sep">×</span>
      <input class="set-input" type="number" inputmode="numeric" value="${set.reps||''}" placeholder="0"
        onchange="updateSet(${ei},${si},'reps',this.value)" onfocus="this.select()">
      <button class="${set.completed?'set-done-btn done':'set-done-btn'}" onclick="toggleSet(${ei},${si})">${set.completed?'✓':''}</button>
    </div>`;
  }).join('');
  const allDone=ex.sets.length>0&&ex.sets.every(s=>s.completed);
  return `
    <div class="exercise-card" id="ex-card-${ei}">
      <div class="exercise-card-header" style="${allDone?'opacity:0.6':''}">
        <div class="exercise-card-info">
          <div class="ex-name">${ex.name}${allDone?' ✓':''}</div>
          <div class="ex-cat">${ex.cat}${ex.muscle?' · '+ex.muscle:''}</div>

      </div>
      <div class="sets-header"><span>SET</span><span>PREV</span><span>KG</span><span></span><span>REPS</span><span></span></div>
      ${setsHtml}

      <div class="exercise-actions">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="addSet(${ei})">+ Set</button>
        ${ex.sets.length>1?`<button class="btn btn-danger btn-sm" onclick="removeSet(${ei})">− Set</button>`:''}
      </div>
    </div>`;
}

function updateSet(ei,si,field,value){if(activeWorkout)activeWorkout.exercises[ei].sets[si][field]=field==='reps'?parseInt(value)||0:parseFloat(value)||0;}
function updateNote(ei,value){if(activeWorkout)activeWorkout.exercises[ei].note=value;}

function toggleSet(ei,si) {
  if(!activeWorkout) return;
  const set=activeWorkout.exercises[ei].sets[si];
  const row=document.getElementById(`set-${ei}-${si}`);
  if(row){const inp=row.querySelectorAll('input');set.weight=parseFloat(inp[0].value)||0;set.reps=parseInt(inp[1].value)||0;}
  set.completed=!set.completed;
  if(row){
    row.className=set.completed?'set-row completed':'set-row';
    const btn=row.querySelector('.set-done-btn');
    if(btn){btn.className=set.completed?'set-done-btn done':'set-done-btn';btn.textContent=set.completed?'✓':'';}
    row.querySelectorAll('.set-input').forEach(inp=>inp.style.borderColor=set.completed?'var(--green)':'');
  }
  const ex=activeWorkout.exercises[ei];
  const card=document.getElementById(`ex-card-${ei}`);
  if(card){
    const allDone=ex.sets.length>0&&ex.sets.every(s=>s.completed);
    const hdr=card.querySelector('.exercise-card-header');if(hdr)hdr.style.opacity=allDone?'0.6':'';
    const nm=card.querySelector('.ex-name');if(nm)nm.textContent=ex.name+(allDone?' ✓':'');
  }
  const cs2=activeWorkout.exercises.reduce((t,ex2)=>t+ex2.sets.filter(s=>s.completed).length,0);
  const ts2=activeWorkout.exercises.reduce((t,ex2)=>t+ex2.sets.length,0);
  const ctr=document.querySelector('.workout-topbar span[style*="font-size:12px"]');
  if(ctr)ctr.textContent=`${cs2}/${ts2} sets`;
  if(set.completed) startRestTimer();
  if(navigator.vibrate) navigator.vibrate(30);
}

function addSet(ei){
  if(!activeWorkout) return;
  const ex=activeWorkout.exercises[ei];
  const last=ex.sets[ex.sets.length-1];
  ex.sets.push({weight:last?last.weight:0,reps:last?last.reps:10,completed:false});
  const card=document.getElementById(`ex-card-${ei}`);
  if(card) card.outerHTML=renderExerciseCard(ex,ei); else renderContent();
}
function removeSet(ei){
  if(!activeWorkout||activeWorkout.exercises[ei].sets.length<=1) return;
  activeWorkout.exercises[ei].sets.pop();
  const card=document.getElementById(`ex-card-${ei}`);
  if(card) card.outerHTML=renderExerciseCard(activeWorkout.exercises[ei],ei); else renderContent();
}
function removeExercise(ei){if(activeWorkout){activeWorkout.exercises.splice(ei,1);renderContent();}}

// ── REST TIMER ────────────────────────────────────────────
function startRestTimer(){
  restTotal=STORE.getSettings().restTime||90;restRemaining=restTotal;
  clearInterval(restTimer);
  document.getElementById('rest-modal').classList.remove('hidden');
  updateRestDisplay();
  restTimer=setInterval(()=>{restRemaining--;updateRestDisplay();if(restRemaining<=0){clearInterval(restTimer);if(navigator.vibrate)navigator.vibrate([200,100,200]);}},1000);
}
function updateRestDisplay(){
  const el=document.getElementById('rest-display'),prog=document.getElementById('rest-progress');
  if(!el) return;
  el.textContent=fmtDuration(Math.max(0,restRemaining));
  el.className='rest-time-display'+(restRemaining<=10?' urgent':'');
  if(prog) prog.style.width=`${Math.max(0,restRemaining/restTotal*100)}%`;
}
function skipRest(){clearInterval(restTimer);document.getElementById('rest-modal').classList.add('hidden');}
function addRestTime(d){restRemaining=Math.max(0,restRemaining+d);restTotal=Math.max(restTotal,restRemaining);updateRestDisplay();}

// ── FINISH MODAL ──────────────────────────────────────────
function openFinishModal(){
  if(!activeWorkout) return;
  const completed=activeWorkout.exercises.map(ex=>({...ex,sets:ex.sets.filter(s=>s.completed)})).filter(ex=>ex.sets.length>0);
  const vol=calcVolume(completed);
  document.getElementById('finish-modal-content').innerHTML=`
    <div class="finish-title">Finish Workout?</div>
    <div class="finish-sub">${fmtDuration(workoutElapsed)} · ${activeWorkout.name}</div>
    <div class="finish-stats">
      <div class="finish-stat"><span class="finish-stat-val">${completed.length}</span><span class="finish-stat-label">Exercises</span></div>
      <div class="finish-stat"><span class="finish-stat-val">${completed.reduce((t,e)=>t+e.sets.length,0)}</span><span class="finish-stat-label">Sets Done</span></div>
      <div class="finish-stat"><span class="finish-stat-val">${fmtVol(vol)}</span><span class="finish-stat-label">Volume (kg)</span></div>
    </div>
    <div class="finish-actions">
      <button class="btn btn-primary" onclick="saveWorkout()">Save Workout</button>
      <button class="btn btn-ghost"   onclick="closeFinishModal()">Keep Going</button>
      <button class="btn btn-danger"  onclick="discardWorkout()">Discard</button>
    </div>`;
  document.getElementById('finish-modal').classList.remove('hidden');
}
function closeFinishModal(){document.getElementById('finish-modal').classList.add('hidden');}

function saveWorkout(){
  if(!activeWorkout) return;
  clearInterval(workoutTimer);clearInterval(restTimer);skipRest();closeFinishModal();
  const endTime=Date.now();
  const exercises=activeWorkout.exercises.map(ex=>({
    exerciseId:ex.exerciseId,name:ex.name,cat:ex.cat,
    sets:ex.sets.filter(s=>s.completed).map(s=>({weight:s.weight,reps:s.reps})),
  })).filter(ex=>ex.sets.length>0);
  const prsAchieved=[];
  exercises.forEach(ex=>ex.sets.forEach(set=>{if(set.weight>0&&set.reps>0&&checkUpdatePR(ex.exerciseId,set.weight,set.reps)&&!prsAchieved.includes(ex.exerciseId))prsAchieved.push(ex.exerciseId);}));
  const session={id:activeWorkout.id,templateId:activeWorkout.templateId,name:activeWorkout.name,
    date:new Date().toISOString().split('T')[0],startTime:activeWorkout.startTime,endTime,
    duration:Math.floor((endTime-activeWorkout.startTime)/1000),
    exercises,totalVolume:calcVolume(exercises),prsAchieved};
  const history=STORE.getHistory();history.push(session);STORE.saveHistory(history);
  activeWorkout=null;workoutElapsed=0;
  navigate('home');
  setTimeout(()=>showToast(prsAchieved.length>0?`Saved! 🏆 ${prsAchieved.length} PR${prsAchieved.length>1?'s':''} achieved!`:'Workout saved! Great work 💪'),300);
}
function discardWorkout(){
  if(!confirm('Discard this workout? All progress will be lost.')) return;
  clearInterval(workoutTimer);clearInterval(restTimer);skipRest();closeFinishModal();
  activeWorkout=null;workoutElapsed=0;navigate('home');
}

// ── EXERCISE PICKER ───────────────────────────────────────
function openPicker(){
  pickerFilter='All';pickerSearch='';
  document.getElementById('picker-modal').classList.remove('hidden');
  renderPickerCats();renderPickerList();
  setTimeout(()=>document.getElementById('picker-search-input')?.focus(),200);
}
function closePicker(){document.getElementById('picker-modal').classList.add('hidden');}
function renderPickerCats(){
  const cats=['All',...new Set(EXERCISES.map(e=>e.cat))];
  document.getElementById('picker-cats').innerHTML=cats.map(c=>`<button class="cat-tab ${c===pickerFilter?'active':''}" onclick="setPickerFilter('${c}')">${c}</button>`).join('');
}
function setPickerFilter(c){pickerFilter=c;renderPickerCats();renderPickerList();}
function filterPicker(q){pickerSearch=q;renderPickerList();}
function renderPickerList(){
  const q=pickerSearch.toLowerCase();
  const list=EXERCISES.filter(e=>(pickerFilter==='All'||e.cat===pickerFilter)&&(!q||e.name.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q)));
  document.getElementById('picker-list').innerHTML=list.map(e=>`
    <div class="picker-item" onclick="addExerciseFromPicker('${e.id}')">
      <div><div class="picker-item-name">${e.name}</div><div class="picker-item-cat">${e.cat} · ${e.muscle} · ${e.equip}</div></div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>`).join('')||'<div style="padding:24px;text-align:center;color:var(--faint)">No exercises found</div>';
}
function addExerciseFromPicker(id){
  if(!activeWorkout) return;
  const ex=EXERCISES.find(e=>e.id===id);if(!ex) return;
  activeWorkout.exercises.push(buildExerciseEntry(ex,3,10,getLastExData(id)));
  closePicker();renderContent();
  setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),100);
}

// ── HISTORY VIEW ──────────────────────────────────────────
function renderHistory(){
  const history=STORE.getHistory().slice().reverse();
  if(!history.length) return `<div class="page-header"><h2>History</h2></div><div class="empty-state"><div class="empty-icon">📅</div><h3>No workouts logged yet</h3><p>Complete your first workout and it'll show up here</p></div>`;
  return `<div class="page-header"><h2>History</h2></div><div class="history-list">${history.map(renderWorkoutCard).join('')}</div><div style="height:8px"></div>`;
}

// ── HISTORY DETAIL ────────────────────────────────────────
function renderHistoryDetail(){
  const w=STORE.getHistory().find(h=>String(h.id)===String(historyDetailId));
  if(!w){navigate('history');return'';}
  const prsAchieved=w.prsAchieved||[];
  const exCards=w.exercises.map(ex=>{
    const hasPR=prsAchieved.includes(ex.exerciseId);
    const sets=ex.sets.map((set,i)=>`<div class="hec-set"><span class="set-n">SET ${i+1}</span><span class="set-val">${set.weight} kg × ${set.reps} reps</span>${hasPR&&i===ex.sets.length-1?'<span class="pr-star">★ PR</span>':''}</div>`).join('');
    return `<div class="history-ex-card"><div class="hec-name">${ex.name}${hasPR?' <span class="badge badge-orange" style="font-size:10px">PR</span>':''}</div><div class="hec-sets">${sets}</div></div>`;
  }).join('');
  return `
    <div class="page-header"><button class="btn btn-icon" onclick="navigate('history')" style="flex-shrink:0">‹</button><h2 style="flex:1">${w.name}</h2></div>
    <div class="history-detail-header">
      <div class="hdh-name">${w.name}</div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px">${fmtDate(new Date(w.startTime).toISOString())}</div>
      <div class="hdh-meta">
        <div class="hdh-meta-item"><span>${fmtDuration(w.duration||0)}</span><span>Duration</span></div>
        <div class="hdh-meta-item"><span>${fmtVol(w.totalVolume||0)} kg</span><span>Volume</span></div>
        <div class="hdh-meta-item"><span>${w.exercises.length}</span><span>Exercises</span></div>
        <div class="hdh-meta-item"><span>${prsAchieved.length}</span><span>New PRs</span></div>
      </div>
    </div>
    ${exCards}<div style="height:24px"></div>`;
}

// ── EXERCISES VIEW ────────────────────────────────────────
function renderExercises(){
  const cats=['All',...new Set(EXERCISES.map(e=>e.cat))];
  const prs=STORE.getPRs();
  const q=exercisesSearch.toLowerCase();
  const list=EXERCISES.filter(e=>(exercisesFilter==='All'||e.cat===exercisesFilter)&&(!q||e.name.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q)));
  return `
    <div class="page-header"><h2>Exercise Library</h2></div>
    <input type="text" class="search-box" placeholder="Search exercises..." value="${exercisesSearch}" oninput="setExSearch(this.value)">
    <div class="category-tabs">${cats.map(c=>`<button class="cat-tab ${c===exercisesFilter?'active':''}" onclick="setExFilter('${c}')">${c}</button>`).join('')}</div>
    <div class="exercise-list">
      ${list.map(e=>{const pr=prs[e.id];return`<div class="exercise-item">
        <div class="ei-info"><div class="ei-name">${e.name}</div><div class="ei-meta">${e.cat} · ${e.muscle} · ${e.equip}</div></div>
        ${pr?`<div class="ei-pr"><div class="ei-pr-val">${pr.weight} kg</div><div class="ei-pr-label">Best ×${pr.reps}</div></div>`:''}
      </div>`;}).join('')||'<div style="padding:24px;text-align:center;color:var(--faint)">No exercises found</div>'}
    </div><div style="height:16px"></div>`;
}
function setExFilter(c){exercisesFilter=c;renderContent();}
function setExSearch(q){exercisesSearch=q;renderContent();}

// ── HIDE MOBILE PROFILE BTN ON DESKTOP ───────────────────
function applyResponsive() {
  const isDesktop=window.innerWidth>=768;
  const mb=document.getElementById('mobile-profile-wrap');
  if(mb) mb.style.display=isDesktop?'none':'';
  const ts=document.getElementById('total-stat');
  if(ts) ts.style.display=isDesktop?'':'none';
}
window.addEventListener('resize',applyResponsive);

// ── INIT ──────────────────────────────────────────────────
function init(){
  const profileId=getCurrentProfileId();
  const profiles=getProfiles();
  if(!profileId||!profiles.find(p=>p.id===profileId)){
    navigate('profiles');
  } else {
    navigate('home');
  }
  applyResponsive();
}
init();
</script>
